<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f4f1;color:#1a2e1e;min-height:100vh;padding-bottom:80px}
:root{--g1:#1e7a4a;--g2:#15603a;--acc:#25a05e;--acc-light:#e6f4ed;--acc-text:#1e7a4a;--fixed1:#2d6e4e;--fixed2:#1a4a34}
.tab-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid #d6e8dc;z-index:100;padding:4px 0 8px}
.tab-btn{flex:1;padding:6px 2px;border:none;background:none;color:#9ab0a0;font-size:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.tab-btn svg{width:21px;height:21px;stroke-width:1.8}
.tab-btn.active{color:var(--g1)}
.tab-icon{padding:2px 8px;transition:background .2s;border-radius:12px}
.tab-btn.active .tab-icon{background:var(--acc-light)}
.page{display:none;padding:16px 14px;max-width:480px;margin:0 auto}
.page.active{display:block}
.page-header{font-size:22px;font-weight:700;color:#1a2e1e;margin-bottom:16px;letter-spacing:-.5px}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03);margin-bottom:14px;overflow:hidden}
.card-header{padding:14px 16px 0;font-size:11px;font-weight:600;color:#7a9e86;letter-spacing:.5px;text-transform:uppercase}
.card-body{padding:14px 16px}
.grad-card{border-radius:16px;padding:20px;margin-bottom:14px;color:#fff;box-shadow:0 4px 14px rgba(30,122,74,.3)}
.grad-card.green{background:linear-gradient(135deg,var(--g1),var(--g2))}
.grad-card.teal{background:linear-gradient(135deg,var(--fixed1),var(--fixed2))}
.grad-card.combined{background:linear-gradient(135deg,#1a5c3a,#0f3d26)}
.grad-card .lbl{font-size:12px;opacity:.8;margin-bottom:4px;font-weight:500}
.grad-card .big{font-size:38px;font-weight:700;letter-spacing:-1.5px;margin-bottom:14px}
.grad-card .sub{display:flex;justify-content:space-around;padding-top:12px;border-top:1px solid rgba(255,255,255,.2)}
.grad-card .sub-item{text-align:center}
.grad-card .sub-item .sl{font-size:11px;opacity:.7;margin-bottom:3px}
.grad-card .sub-item .sv{font-size:15px;font-weight:600}
.month-selector{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.03);padding:10px 16px}
.month-nav{background:none;border:none;cursor:pointer;color:var(--g1);padding:4px;display:flex;align-items:center;border-radius:8px}
.month-nav svg{width:20px;height:20px;stroke-width:2.2}
.month-label-btn{font-size:17px;font-weight:700;color:#1a2e1e;background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:8px;border-bottom:2px solid var(--acc);line-height:1.3;transition:background .2s}
.month-label-btn:hover{background:var(--acc-light)}
.view-toggle{background:#f0f4f1;border:none;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#4a7a58;font-weight:500}
.entry-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #f0f4f1}
.entry-item:last-child{border-bottom:none}
.cat-badge{font-size:10px;padding:3px 8px;border-radius:99px;background:var(--acc-light);color:var(--acc-text);white-space:nowrap;font-weight:500;flex-shrink:0}
.entry-info{flex:1;min-width:0}
.entry-memo{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-date{font-size:11px;color:#9ab0a0;margin-top:2px}
.entry-amount{font-size:15px;font-weight:600;white-space:nowrap}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;color:#b8cfc0}
.icon-btn:hover{color:var(--g1)}
.icon-btn.del:hover{color:#e05252}
.icon-btn svg{width:15px;height:15px;stroke-width:2}
.btn-primary{width:100%;padding:13px;background:var(--g1);color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;margin-top:10px;box-shadow:0 2px 8px rgba(30,122,74,.3);display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:active{opacity:.85}
.btn-ghost{width:100%;padding:11px;background:#f0f4f1;color:#4a7a58;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;margin-top:6px}
.btn-sm{padding:10px 16px;background:var(--g1);color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600}
.hint-text{font-size:12px;color:#9ab0a0;margin-bottom:8px;text-align:center;line-height:1.6}
.memo-textarea{width:100%;border:1.5px solid #d6e8dc;border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:#1a2e1e;background:#f7faf8;resize:none;height:110px}
.memo-textarea:focus{outline:none;border-color:var(--g1);background:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1.5px solid #e6f0e9}
th{text-align:left;padding:6px 4px;font-weight:600;color:#9ab0a0;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
tbody tr{border-bottom:1px solid #f0f4f1}
tbody tr:last-child{border-bottom:none}
td{padding:9px 4px;vertical-align:middle}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#4a7a58}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.setting-label{font-size:13px;color:#4a7a58;margin-bottom:6px;font-weight:500}
.setting-input{width:100%;padding:10px 12px;border:1.5px solid #d6e8dc;border-radius:10px;font-size:15px;background:#f7faf8;color:#1a2e1e}
.setting-input:focus{outline:none;border-color:var(--g1);background:#fff}
.cat-list{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 12px}
.cat-chip{display:flex;align-items:center;gap:5px;background:#f0f4f1;border-radius:99px;padding:5px 10px 5px 12px;font-size:13px;font-weight:500}
.cat-chip .chip-del{background:none;border:none;cursor:pointer;color:#9ab0a0;display:flex;align-items:center;padding:1px}
.cat-chip .chip-del svg{width:13px;height:13px;stroke-width:2.5}
.add-row{display:flex;gap:8px;margin-bottom:10px}
.add-row input{flex:1;padding:10px 12px;border:1.5px solid #d6e8dc;border-radius:10px;font-size:14px;background:#f7faf8;color:#1a2e1e}
.add-row input:focus{outline:none;border-color:var(--g1);background:#fff}
.divider{height:1px;background:#f0f4f1;margin:12px 0}
.empty{text-align:center;padding:24px;color:#9ab0a0;font-size:13px}
.fixed-form{display:flex;flex-direction:column;gap:8px}
.fixed-form input,.fixed-form select{padding:10px 12px;border:1.5px solid #d6e8dc;border-radius:10px;font-size:14px;background:#f7faf8;color:#1a2e1e;font-family:inherit}
.fixed-form input:focus,.fixed-form select:focus{outline:none;border-color:var(--g1);background:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:480px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:12px;color:#9ab0a0;font-weight:600;letter-spacing:.3px;text-transform:uppercase;display:block;margin-bottom:5px}
.modal-field input,.modal-field select{width:100%;padding:10px 12px;border:1.5px solid #d6e8dc;border-radius:10px;font-size:15px;background:#f7faf8;color:#1a2e1e;font-family:inherit}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--g1);background:#fff}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600}
.modal-cancel{background:#f0f4f1;color:#4a7a58}
.modal-save{background:var(--g1);color:#fff}
.picker-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center}
.picker-overlay.open{display:flex}
.picker-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:480px}
.picker-sheet h3{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center}
.picker-year-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
.picker-year-nav button{background:var(--acc-light);border:none;cursor:pointer;color:var(--g1);padding:4px 14px;border-radius:8px;font-size:22px;line-height:1}
.picker-year-label{font-size:18px;font-weight:700;min-width:80px;text-align:center}
.picker-months{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.picker-month-btn{padding:12px 4px;border:1.5px solid #d6e8dc;border-radius:10px;background:#f7faf8;font-size:14px;font-weight:500;cursor:pointer;color:#1a2e1e;transition:all .15s}
.picker-month-btn.selected{background:var(--g1);color:#fff;border-color:var(--g1)}
.picker-month-btn:hover:not(.selected){background:var(--acc-light);border-color:var(--g1)}
.budget-month-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f4f1}
.budget-month-row:last-child{border-bottom:none}
.budget-month-row .ml{font-size:14px;font-weight:500}
.budget-month-row .mi{width:130px;padding:7px 10px;border:1.5px solid #d6e8dc;border-radius:8px;font-size:14px;background:#f7faf8;color:#1a2e1e;text-align:right}
.budget-month-row .mi:focus{outline:none;border-color:var(--g1);background:#fff}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f4f1}
.summary-row:last-child{border-bottom:none}
.summary-row .sr-label{font-size:14px;color:#4a7a58;font-weight:500}
.summary-row .sr-val{font-size:16px;font-weight:700}
</style>
</head>
<body>

<!-- 入力タブ -->
<div id="page-memo" class="page active">
  <div class="page-header">入力</div>
  <div class="grad-card green">
    <div class="lbl">今月の残高</div>
    <div class="big" id="top-bal-amount">¥0</div>
    <div class="sub">
      <div class="sub-item"><div class="sl">予算</div><div class="sv" id="top-budget">¥0</div></div>
      <div class="sub-item"><div class="sl">今月の支出</div><div class="sv" id="top-spent">¥0</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">支出を追加</div>
    <div class="card-body">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="hint-text">「5/6 コンビニ 980」のように<br>日付・内容・金額を自由に入力</div>
        <textarea class="memo-textarea" id="memo-input" placeholder="例: 5/6 コンビニ 980&#10;交通費 220&#10;5月12日 ランチ 1200"></textarea>
        <button class="btn-primary" onclick="parseMemo()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          追加する
        </button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header" style="padding-bottom:10px">今月の履歴</div>
    <div class="card-body" style="padding-top:4px"><div id="entry-list"></div></div>
  </div>
</div>

<!-- 家計簿タブ（新規・合算） -->
<div id="page-kakeibo" class="page">
  <div class="page-header">家計簿</div>
  <div class="month-selector">
    <button class="month-nav" onclick="changeMonth(-1,'kakeibo')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="month-label-btn" id="kakeibo-month-label" onclick="openPicker('kakeibo')"></button>
    <button class="month-nav" onclick="changeMonth(1,'kakeibo')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <div id="kakeibo-content"></div>
</div>

<!-- 支出タブ（旧家計簿） -->
<div id="page-dash" class="page">
  <div class="page-header">支出</div>
  <div class="month-selector">
    <button class="month-nav" onclick="changeMonth(-1,'dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="month-label-btn" id="dash-month-label" onclick="openPicker('dash')"></button>
    <button class="month-nav" onclick="changeMonth(1,'dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
    <button class="view-toggle" id="view-toggle" onclick="toggleView()">年間ビュー</button>
  </div>
  <div id="dash-content"></div>
</div>

<!-- 固定費タブ -->
<div id="page-fixed" class="page">
  <div class="page-header">固定費</div>
  <div class="month-selector">
    <button class="month-nav" onclick="changeMonth(-1,'fixed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="month-label-btn" id="fixed-month-label" onclick="openPicker('fixed')"></button>
    <button class="month-nav" onclick="changeMonth(1,'fixed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <div id="fixed-content"></div>
</div>

<!-- 設定タブ -->
<div id="page-settings" class="page">
  <div class="page-header">設定</div>
  <div class="card">
    <div class="card-header">月別予算設定</div>
    <div class="card-body">
      <div class="setting-label">デフォルト予算（未設定の月に適用）</div>
      <input type="number" class="setting-input" id="default-budget-input" placeholder="例: 150000">
      <button class="btn-primary" onclick="saveDefaultBudget()" style="margin-top:10px">デフォルト予算を保存</button>
      <div class="divider"></div>
      <div class="setting-label">月ごとの予算（空欄=デフォルト適用）</div>
      <div id="monthly-budget-list"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">カテゴリ管理</div>
    <div class="card-body">
      <div class="cat-list" id="cat-list"></div>
      <div class="add-row">
        <input type="text" id="new-cat-input" placeholder="新しいカテゴリ名">
        <button class="btn-sm" onclick="addCategory()">追加</button>
      </div>
      <div class="divider"></div>
      <button class="btn-ghost" onclick="resetCategories()">デフォルトに戻す</button>
    </div>
  </div>
</div>

<!-- タブバー -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tab-memo" onclick="switchTab('memo')">
    <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
    入力
  </button>
  <button class="tab-btn" id="tab-kakeibo" onclick="switchTab('kakeibo')">
    <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M3 6h18M3 18h18"/></svg></span>
    家計簿
  </button>
  <button class="tab-btn" id="tab-dash" onclick="switchTab('dash')">
    <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>
    支出
  </button>
  <button class="tab-btn" id="tab-fixed" onclick="switchTab('fixed')">
    <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></span>
    固定費
  </button>
  <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')">
    <span class="tab-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
    設定
  </button>
</nav>

<!-- ピッカー -->
<div class="picker-overlay" id="picker-overlay">
  <div class="picker-sheet">
    <h3>年月を選択</h3>
    <div class="picker-year-nav">
      <button onclick="pickerChangeYear(-1)">&#8249;</button>
      <span class="picker-year-label" id="picker-year-label"></span>
      <button onclick="pickerChangeYear(1)">&#8250;</button>
    </div>
    <div class="picker-months" id="picker-months"></div>
    <button class="btn-ghost" onclick="closePicker()">キャンセル</button>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>支出を編集</h3>
    <div class="modal-field"><label>日付</label><input type="date" id="edit-date"></div>
    <div class="modal-field"><label>内容</label><input type="text" id="edit-memo"></div>
    <div class="modal-field"><label>金額</label><input type="number" id="edit-amount"></div>
    <div class="modal-field"><label>カテゴリ</label><select id="edit-category"></select></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeEditModal()">キャンセル</button>
      <button class="modal-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- 固定費編集モーダル -->
<div class="modal-overlay" id="fixed-edit-modal">
  <div class="modal">
    <h3>固定費を編集</h3>
    <div class="modal-field"><label>名前</label><input type="text" id="fedit-name"></div>
    <div class="modal-field"><label>金額</label><input type="number" id="fedit-amount"></div>
    <div class="modal-field"><label>カテゴリ</label><select id="fedit-category"></select></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeFixedEditModal()">キャンセル</button>
      <button class="modal-save" onclick="saveFixedEdit()">保存</button>
    </div>
  </div>
</div>

<script>
const SK='kakeibo_v5';
const DEFAULT_CATS=['食費','交通費','日用品','娯楽','外食','医療','衣類','その他'];
const CAT_COLORS=['#1e7a4a','#2a9d6e','#D85A30','#D4537E','#639922','#BA7517','#533AB7','#73726c'];
let state={defaultBudget:0,monthlyBudgets:{},categories:[...DEFAULT_CATS],entries:[],fixedItems:{}};
let dashM=new Date().getMonth(),dashY=new Date().getFullYear();
let fixedM=new Date().getMonth(),fixedY=new Date().getFullYear();
let kakeiboM=new Date().getMonth(),kakeiboY=new Date().getFullYear();
let isYearView=false;
let pieChart=null,barChart=null,fixedPieChart=null,kakeiboChart=null;
let editingId=null,editingFixedId=null;
let pickerTarget=null,pickerY=new Date().getFullYear();
let settingsBudgetYear=new Date().getFullYear();

function load(){try{const d=localStorage.getItem(SK);if(d)state=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
load();

function switchTab(t){
  ['memo','kakeibo','dash','fixed','settings'].forEach(x=>{
    document.getElementById('page-'+x).classList.remove('active');
    document.getElementById('tab-'+x).classList.remove('active');
  });
  document.getElementById('page-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='kakeibo')renderKakeibo();
  if(t==='dash')renderDash();
  if(t==='memo'){renderEntries();updateTopBalance();}
  if(t==='fixed')renderFixed();
  if(t==='settings')renderSettings();
}

// ── メモ解析 ──
function parseMemo(){
  const raw=document.getElementById('memo-input').value.trim();
  if(!raw)return;
  const lines=raw.split('\n').filter(l=>l.trim());
  let added=0;
  lines.forEach(line=>{const e=parseLine(line.trim());if(e){state.entries.unshift(e);added++;}});
  if(added>0){save();document.getElementById('memo-input').value='';renderEntries();updateTopBalance();}
  else alert('入力を認識できませんでした。\n例: 5/6 コンビニ 980');
}
function parseLine(line){
  const now=new Date();let date=now.toISOString().split('T')[0],text=line;
  const ps=[
    {r:/^(\d{1,2})[\/月](\d{1,2})日?\s+/,fn:m=>`${now.getFullYear()}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`},
    {r:/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s+/,fn:m=>`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`},
    {r:/^(\d{1,2})日\s+/,fn:m=>`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${m[1].padStart(2,'0')}`}
  ];
  for(const p of ps){const m=text.match(p.r);if(m){date=p.fn(m);text=text.slice(m[0].length);break;}}
  const am=text.match(/[,，]?\s*(\d[\d,，]*)\s*円?$/);
  if(!am)return null;
  const amount=parseInt(am[1].replace(/[,，]/g,''));
  const memo=text.slice(0,text.lastIndexOf(am[0])).trim()||text;
  return{id:Date.now()+Math.random(),date,memo,amount,category:guessCategory(memo)};
}
const KW={食費:['スーパー','食料','食品','米','野菜','肉','魚','お菓子','コーヒー'],交通費:['電車','バス','タクシー','交通','suica','pasmo','定期','新幹線'],外食:['ランチ','ディナー','コンビニ','カフェ','レストラン','食事','飲み','ラーメン','寿司','焼肉','居酒屋','マック','スタバ'],日用品:['日用品','ドラッグ','薬局','シャンプー','洗剤','消耗品'],娯楽:['映画','ゲーム','本','漫画','音楽','動画','netflix','spotify'],医療:['病院','クリニック','薬','医療','歯医者'],衣類:['服','靴','洋服','ユニクロ','zara','アパレル']};
function guessCategory(memo){
  const l=memo.toLowerCase();
  for(const[cat,kws]of Object.entries(KW)){if(state.categories.includes(cat)&&kws.some(k=>l.includes(k)))return cat;}
  return state.categories[state.categories.length-1]||'その他';
}

    </div>`).join('')}`;
  document.getElementById('cat-list').innerHTML=state.categories.map((c,i)=>`
    <span class="cat-chip">${c}<button class="chip-del" onclick="removeCategory(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></span>`).join('');
}
function changeSettingsYear(d){settingsBudgetYear+=d;renderSettings();}
function saveDefaultBudget(){
  const v=parseInt(document.getElementById('default-budget-input').value);
  if(!isNaN(v)&&v>=0){state.defaultBudget=v;save();updateTopBalance();}
}
function saveMonthlyBudget(y,m,val){
  const k=`${y}-${m}`;const v=parseInt(val);
  if(!isNaN(v)&&v>0)state.monthlyBudgets[k]=v;else delete state.monthlyBudgets[k];
  save();updateTopBalance();
}
function addCategory(){
  const inp=document.getElementById('new-cat-input');const v=inp.value.trim();
  if(v&&!state.categories.includes(v)){state.categories.push(v);save();inp.value='';renderSettings();}
}
function removeCategory(i){if(state.categories.length<=1)return;state.categories.splice(i,1);save();renderSettings();}
function resetCategories(){if(confirm('カテゴリをデフォルトに戻しますか？')){state.categories=[...DEFAULT_CATS];save();renderSettings();}}

document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el){el.classList.remove('open');editingId=null;editingFixedId=null;}});
});

renderEntries();updateTopBalance();
</script>
</body>
</html>
